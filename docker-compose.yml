version: '3.8'

services:

  web:
    image: nginx:latest
    container_name: web
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
    networks:
      - voting-network

  app:
    build: .
    container_name: voting-app
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: votingdb
    depends_on:
      - db
    networks:
      - voting-network

  db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: votingdb
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - voting-network

volumes:
  mysql-data:

networks:
  voting-network:
